name: NGHyFloAPI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nghyfloapi-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-verify:
    name: Compile, Test, and Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Compile
        run: mvn -q -DskipTests compile

      - name: Test
        run: mvn -q test

      - name: Verify quality gates
        run: mvn -q verify
